# Workflow de Integração Contínua (CI)
# Responsável por executar os testes unitários da aplicação.
# Estrutura preparada para expansão futura de etapas e jobs.

name: Continuous Integration

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '24'
  VERCEL_TOKEN: ${{secrets.VERCEL_TOKEN}}
  VERCEL_SCOPE: ${{secrets.VERCEL_SCOPE}}
  VERCEL_PROJECT_ID: ${{secrets.VERCEL_PROJECT_ID}}
  VERCEL_ORG_ID: ${{secrets.VERCEL_ORG_ID}}

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      # Realiza o checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Configura o ambiente Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # Instala as dependências do projeto
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Executa os testes unitários com Vitest
      - name: Run unit tests
        run: yarn test

  build-and-deploy:
    name: Build & Deploy Vercel Preview
    needs: [unit-tests]
    runs-on: ubuntu-latest
    outputs: 
      deploy-url: ${{ steps.deploy.outputs.deployment-url }}

    steps: 
   # Realiza o checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Configura o ambiente Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # Instala as dependências do projeto
      - name: Install dependencies
        run: yarn install 

      # Obter as configurações do vercel
      - name: Pull Vercel Configuration
        run: yarn vercel pull --yes --environment=preview --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE

      # Build para o Vercel
      - name: Build
        run: yarn vercel build --token=$VERCEL_TOKEN
      
      # Deploy previe para o Vercel
      - name: Deploy Preview
        id: deploy
        run:  |
         URL=$(yarn vercel deploy --prebuilt --target=preview --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE)
         echo "deployment-url=$URL" >> $GITHUB_OUTPUT

  e2e-tests:
    name: Run E2E Tests
    needs: [build-and-deploy]
    runs-on: ubuntu-latest

    steps:
      # Realiza o checkout do código do repositório
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      # Configura o ambiente Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # Instala as dependências do projeto
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      #Instalação do Chromium
      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      # Executar testes E2E
      - name: Run E2E regression tests
        run: yarn playwright test playwright/e2e/online.spec.ts
        env:
          BASE_URL: ${{ needs.build-and-deploy.outputs.deployment-url }}

      # Relatório de testes automatizados
      - name: Upload Playwright report
        if: ${{ !cancelled()}}  
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report
          path: playwright-report

      